services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: undocx_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: undocx
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    configs:
      - source: init_extensions
        target: /docker-entrypoint-initdb.d/01-extensions.sql

  mailpit:
    image: axllent/mailpit
    container_name: undocx_mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  postgres_data:

configs:
  init_extensions:
    content: "CREATE EXTENSION IF NOT EXISTS vector;\n"
